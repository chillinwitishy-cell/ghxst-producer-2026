name: Deploy GHXST Da Producer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          cat > package.json << 'EOF'
          {
            "name": "ghxst-da-producer",
            "version": "1.0.0",
            "type": "module",
            "scripts": {
              "build": "echo 'Building...' && mkdir -p dist && cp -r src/* dist/ && cp index.html dist/",
              "dev": "echo 'Dev mode'"
            },
            "dependencies": {
              "react": "^18.2.0",
              "react-dom": "^18.2.0"
            }
          }
          EOF
          npm install
          
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
